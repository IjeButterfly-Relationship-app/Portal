name: Deploy Frontend to Digital Ocean

on:
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint
        continue-on-error: false

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build project
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/butterfly
            sudo rm -rf /var/www/butterfly/*
            sudo chown -R $USER:$USER /var/www/butterfly

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/*"
          target: "/var/www/butterfly"
          strip_components: 1
          rm: true

      - name: Setup Nginx and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo tee /etc/nginx/sites-available/butterfly > /dev/null << 'EOF'
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                
                root /var/www/butterfly;
                index index.html index.htm;
                
                location / {
                    try_files $uri $uri/ /index.html;
                }
                
                location /static/ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            EOF
            
            sudo ln -sf /etc/nginx/sites-available/butterfly /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx || echo "Nginx reload failed"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Deployment Verification ==="
            curl -I http://localhost || echo "Health check failed"
            echo "=== Deployment Complete ==="

      - name: Deployment notification
        if: always()
        run: echo "Deployment status - Success!"