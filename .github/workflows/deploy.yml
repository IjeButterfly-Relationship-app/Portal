name: Deploy to Digital Ocean
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.1"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Lint code
        run: npm run lint
        continue-on-error: false
      # - name: Run tests
      #   run: npm test -- --watchAll=false --passWithNoTests
      - name: Build project
        run: npm run build
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.1"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/butterfly
            sudo rm -rf /var/www/butterfly/*
            sudo chown -R $USER:$USER /var/www/butterfly
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/*"
          target: "/var/www/butterfly"
          strip_components: 1
          rm: true
      - name: Setup Nginx for frontend SPA routing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create Nginx config for frontend only (separate file, doesn't touch backend)
            sudo tee /etc/nginx/sites-available/butterfly-frontend > /dev/null << 'EOF'
            server {
                listen 8080;
                server_name _;
                
                root /var/www/butterfly;
                index index.html;
                
                # SPA routing - serve index.html for all non-file paths
                location / {
                    try_files $uri $uri/ /index.html;
                }
                
                # Cache static assets
                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            EOF
            
            # Enable the site (if not already)
            sudo ln -sf /etc/nginx/sites-available/butterfly-frontend /etc/nginx/sites-enabled/butterfly-frontend
            
            # Test config and reload
            sudo nginx -t && sudo systemctl reload nginx
            
            echo "Frontend deployed on port 8080"
      - name: Deployment notification
        if: always()
        run: echo "Deployment status - Success!"