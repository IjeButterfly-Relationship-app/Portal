name: Deploy to Digital Ocean - v2

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build project
        run: npm run build

      - name: Debug build files
        run: ls -la build/

      - name: Create directory and setup Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/butterfly
            sudo rm -rf /var/www/butterfly/*
            sudo chown -R $USER:$USER /var/www/butterfly

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          source: "build/*"
          target: "/var/www/butterfly"
          strip_components: 1
          rm: true

      - name: Setup Nginx and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            # Create Nginx config
            sudo tee /etc/nginx/sites-available/butterfly > /dev/null << 'EOF'
            server {
                listen 8080 default_server;
                listen [::]:8080 default_server;
                
                root /var/www/butterfly;
                index index.html index.htm;
                
                location / {
                    try_files $uri $uri/ /index.html;
                }
                
                location /static/ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            EOF
            
            # Enable site and reload Nginx
            sudo ln -sf /etc/nginx/sites-available/butterfly /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx || sudo service nginx reload
            
            # Verify deployment
            echo "=== Deployment verification ==="
            ls -la /var/www/butterfly/
            curl -I http://localhost:8080 || echo "Local test failed"
            echo "=== Deployment complete ==="
